<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>juego1.html</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

</head>

<body>

<a-scene physics="gravity: -18">

<a-assets>
<img id="sky" src="img/Equirectangular_projection_SW.jpg">
<audio id="music" src="Video/infantil.mp3"></audio>
</a-assets>

<a-sphere radius="150" src="#sky" side="back"></a-sphere>
<a-sound src="#music" autoplay="true" loop="true" volume="0.2"></a-sound>

<!-- SUELO -->
<a-box class="suelo" static-body position="0 0 0" width="10" height="0.5" depth="10"></a-box>

<!-- PLATAFORMAS FÁCILES -->
<a-box class="suelo" static-body position="0 3 -10" width="6" height="0.5" depth="6"></a-box>
<a-box class="suelo" static-body position="0 6 -20" width="6" height="0.5" depth="6"></a-box>
<a-box class="suelo" static-body position="0 9 -30" width="6" height="0.5" depth="6"></a-box>

<!-- META -->
<a-box id="meta" static-body position="0 12 -40" width="6" height="0.5" depth="6" color="#00ffcc"></a-box>

<!-- JUGADOR (EL TUYO) -->
<a-entity id="jugador" position="0 3 0" motor-gameplay dynamic-body="mass:2; fixedRotation:true">

<a-box position="0 1.3 0" width="0.5" height="0.5" depth="0.5" color="#00ffcc"></a-box>
<a-box position="-0.12 1.35 -0.26" width="0.08" height="0.08" depth="0.05" color="black"></a-box>
<a-box position="0.12 1.35 -0.26" width="0.08" height="0.08" depth="0.05" color="black"></a-box>
<a-cylinder position="0 1.7 0" radius="0.05" height="0.3" color="#00ffcc"></a-cylinder>

<a-box position="0 0.6 0" width="0.8" height="0.8" depth="0.5" color="#003366"></a-box>

<a-box position="-0.6 0.6 0" width="0.25" height="0.7"></a-box>
<a-box position="0.6 0.6 0" width="0.25" height="0.7"></a-box>

<a-box position="-0.2 -0.2 0" width="0.3" height="0.7"></a-box>
<a-box position="0.2 -0.2 0" width="0.3" height="0.7"></a-box>

</a-entity>

<a-camera position="0 7 12"></a-camera>

</a-scene>

</body>
</html>
