    <style>
        body {
            margin: 0;
            font-family: "Courier New", monospace;
            background: #000;
            overflow: hidden;
            touch-action: none;
        }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffcc;
            text-align: center;
            background: radial-gradient(circle, #0a1a2e 0%, #000 100%);
            border: 8px double #00ffcc;
            box-sizing: border-box;
        }

        .terminal-box {
            width: min(520px, calc(100vw - 36px));
            padding: 36px;
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 40px #00ffcc;
            border-radius: 12px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 7vw, 48px);
            letter-spacing: 6px;
        }

        input {
            width: min(320px, 100%);
            margin-top: 25px;
            padding: 15px;
            color: #00ffcc;
            background: #000;
            border: 1px solid #00ffcc;
            font: inherit;
            font-size: 20px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            box-sizing: border-box;
        }

        .btn-systec {
            margin-top: 28px;
            padding: 15px 36px;
            color: #000;
            background: #00ffcc;
            border: 0;
            font: inherit;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        #ui-top {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: none;
            min-width: 150px;
            padding: 16px;
            color: #00ffcc;
            background: rgba(0, 10, 20, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 8px;
            line-height: 1.7;
        }

        #mensaje-juego {
            position: absolute;
            top: 110px;
            left: 50%;
            z-index: 11;
            display: none;
            padding: 10px 18px;
            color: #001a33;
            background: #00ffcc;
            border-radius: 6px;
            font-weight: bold;
            transform: translateX(-50%);
        }

        .controles-movil {
            position: absolute;
            bottom: 20px;
            z-index: 1000;
            display: none;
            justify-content: space-between;
            width: 100%;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            gap: 5px;
            pointer-events: auto;
        }

        .d-btn,
        .btn-salto {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.2);
            border: 2px solid #00ffcc;
            border-radius: 8px;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-salto {
            width: 100px;
            height: 80px;
            font-size: 14px;
            pointer-events: auto;
        }
    </style>
    <script>
        let nombrePiloto = "";
        let juegoIniciado = false;

        function iniciarMision() {
            const input = document.querySelector("#input-nombre");

            if (input.value.trim() === "") {
                alert("IDENTIFICACION REQUERIDA");
                return;
            }

            nombrePiloto = input.value.trim().toUpperCase();
            localStorage.setItem("nombrePiloto", nombrePiloto);
            document.querySelector("#user-display").innerText = nombrePiloto;
            document.querySelector("#pantalla-registro").style.display = "none";
            document.querySelector("#ui-top").style.display = "block";

            if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
                document.querySelector(".controles-movil").style.display = "flex";
            }

            setTimeout(() => {
                juegoIniciado = true;
            }, 200);
        }

        function irAlIndex() {
            localStorage.removeItem("puntajeAcumulado");
            window.location.href = "index.html";
        }

        AFRAME.registerComponent("motor-gameplay", {
            init: function () {
                const puntajeGuardado = parseInt(localStorage.getItem("puntajeAcumulado") || "0", 10);

                this.puntos = Number.isNaN(puntajeGuardado) ? 0 : puntajeGuardado;
                this.vidas = 3;
                this.nivelActual = 1;
                this.totalNiveles = 5;
                this.alturaMax = 0;
                this.puedeSaltar = true;
                this.invulnerable = false;
                this.metaAlcanzada = false;
                this.metasCompletadas = new Set();
                this.plataformasVisitadas = new WeakSet();
                this.keys = {};
                this.limiteCaida = -12;
                this.puntoReaparicion = { x: 0, y: 3, z: 0 };

                this.actualizarUI();

                window.addEventListener("keydown", (e) => {
                    this.keys[e.code] = true;
                });

                window.addEventListener("keyup", (e) => {
                    this.keys[e.code] = false;
                });

                this.bindTouch("#m-up", "KeyW");
                this.bindTouch("#m-down", "KeyS");
                this.bindTouch("#m-left", "KeyA");
                this.bindTouch("#m-right", "KeyD");
                this.bindTouch("#m-jump", "Space");

                this.el.addEventListener("collide", (e) => {
                    const target = e.detail.body.el;

                    if (!target || !juegoIniciado) return;

                    if (target.classList.contains("suelo")) {
                        this.guardarPuntoSeguro(target);
                    }

                    if (target.id === "lava") {
                        this.perderVida("CAIDA DETECTADA");
                    }

                    if (target.classList.contains("meta-nivel")) {
                        this.completarNivel(target);
                    }
                });
            },

            bindTouch: function (id, code) {
                const el = document.querySelector(id);
                if (!el) return;

                el.addEventListener("touchstart", (e) => {
                    e.preventDefault();
                    this.keys[code] = true;
                }, { passive: false });

                el.addEventListener("touchend", (e) => {
                    e.preventDefault();
                    this.keys[code] = false;
                }, { passive: false });
            },

            guardarPuntoSeguro: function (plataforma) {
                const yPlataforma = Math.round(plataforma.object3D.position.y);

                this.puntoReaparicion = {
                    x: plataforma.object3D.position.x,
                    y: plataforma.object3D.position.y + 3,
                    z: plataforma.object3D.position.z
                };

                if (!this.plataformasVisitadas.has(plataforma)) {
                    this.plataformasVisitadas.add(plataforma);
                    this.puntos += 200;
                }

                if (yPlataforma > this.alturaMax) {
                    this.puntos += 100;
                    this.alturaMax = yPlataforma;
                }

                this.actualizarUI();
            },

            perderVida: function (mensaje) {
                if (this.invulnerable || this.metaAlcanzada) return;

                this.invulnerable = true;
                this.vidas--;
                this.actualizarUI();

                if (this.vidas <= 0) {
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
                    localStorage.removeItem("puntajeAcumulado");
                    this.finalizarJuego("GAME OVER");
                    return;
                }

                if (navigator.vibrate) navigator.vibrate(200);
                this.mostrarMensaje(mensaje || "REAPARECIENDO");
                this.reaparecer();

                setTimeout(() => {
                    this.invulnerable = false;
                }, 1000);
            },

            reaparecer: function () {
                const punto = this.puntoReaparicion;

                this.el.object3D.position.set(punto.x, punto.y, punto.z);
                this.el.setAttribute("position", `${punto.x} ${punto.y} ${punto.z}`);

                if (this.el.body) {
                    this.el.body.position.set(punto.x, punto.y, punto.z);
                    this.el.body.velocity.set(0, 0, 0);
                    this.el.body.angularVelocity.set(0, 0, 0);
                    this.el.body.quaternion.set(0, 0, 0, 1);

                    if (this.el.body.wakeUp) {
                        this.el.body.wakeUp();
                    }
                }
            },

            completarNivel: function (meta) {
                const nivelMeta = parseInt(meta.dataset.nivel || "1", 10);

                if (this.metasCompletadas.has(nivelMeta) || nivelMeta !== this.nivelActual) {
                    return;
                }

                this.metasCompletadas.add(nivelMeta);
                this.puntoReaparicion = {
                    x: meta.object3D.position.x,
                    y: meta.object3D.position.y + 3,
                    z: meta.object3D.position.z
                };
                this.puntos += nivelMeta === this.totalNiveles ? 5000 : 2500;
                this.actualizarUI();

                if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 500]);

                if (nivelMeta >= this.totalNiveles) {
                    this.metaAlcanzada = true;
                    localStorage.setItem("puntajeAcumulado", this.puntos);
                    this.finalizarJuego("JUEGO COMPLETADO");
                    return;
                }

                this.nivelActual++;
                meta.setAttribute("material", "color: #15524a; emissive: #00ffcc; emissiveIntensity: 0.4");
                this.actualizarUI();
                this.mostrarMensaje(`NIVEL ${this.nivelActual}`);
            },

            actualizarUI: function () {
                const puntosVal = document.querySelector("#puntos-val");
                const vidasVal = document.querySelector("#vidas-val");
                const nivelVal = document.querySelector("#nivel-val");

                if (puntosVal) puntosVal.innerText = this.puntos;
                if (vidasVal) vidasVal.innerHTML = "&#10084;".repeat(Math.max(this.vidas, 0));
                if (nivelVal) nivelVal.innerText = `${this.nivelActual}/${this.totalNiveles}`;
            },

            mostrarMensaje: function (texto) {
                const mensaje = document.querySelector("#mensaje-juego");
                if (!mensaje) return;

                mensaje.innerText = texto;
                mensaje.style.display = "block";

                clearTimeout(this.mensajeTimer);
                this.mensajeTimer = setTimeout(() => {
                    mensaje.style.display = "none";
                }, 900);
            },

            finalizarJuego: function (titulo) {
                juegoIniciado = false;
                document.querySelector("#game-over-screen").style.display = "flex";
                document.querySelector("#final-title").innerText = titulo;
                document.querySelector("#final-score").innerText = `${nombrePiloto}, PUNTUACION: ${this.puntos}`;

                const controles = document.querySelector(".controles-movil");
                if (controles) controles.style.display = "none";
            },

            tick: function () {
                if (!this.el.body || !juegoIniciado) return;

                if (this.el.object3D.position.y < this.limiteCaida || this.el.body.position.y < this.limiteCaida) {
                    this.perderVida("CAIDA DETECTADA");
                    return;
                }

                this.el.body.quaternion.set(0, 0, 0, 1);
                this.el.body.angularVelocity.set(0, 0, 0);

                const v = this.el.body.velocity;
                const f = 8;

                if (this.keys.KeyW) v.z = -f;
                else if (this.keys.KeyS) v.z = f;
                else v.z = 0;

                if (this.keys.KeyA) v.x = -f;
                else if (this.keys.KeyD) v.x = f;
                else v.x = 0;

                if (this.keys.Space) {
                    if (Math.abs(v.y) < 0.15 && this.puedeSaltar) {
                        v.y = 13;
                        this.puedeSaltar = false;
                    }
                } else {
                    this.puedeSaltar = true;
                }
            }
        });

        AFRAME.registerComponent("seguimiento-camara", {
            init: function () {
                this.objetivo = document.querySelector("#jugador");
                this.keys = {};
                this.currentRotation = { x: -20, y: 0, z: 0 };

                window.addEventListener("keydown", (e) => {
                    this.keys[e.code] = true;
                });

                window.addEventListener("keyup", (e) => {
                    this.keys[e.code] = false;
                });
            },

            tick: function () {
                if (!this.objetivo || !juegoIniciado) return;

                this.el.object3D.position.lerp(this.objetivo.object3D.position, 0.1);

                if (this.keys.ArrowLeft) this.currentRotation.y += 2;
                if (this.keys.ArrowRight) this.currentRotation.y -= 2;
                if (this.keys.ArrowUp) this.currentRotation.x -= 1;
                if (this.keys.ArrowDown) this.currentRotation.x += 1;

                this.currentRotation.x = Math.max(-60, Math.min(20, this.currentRotation.x));
                this.el.setAttribute("rotation", `${this.currentRotation.x} ${this.currentRotation.y} ${this.currentRotation.z}`);
            }
        });
    </script>
</head>
